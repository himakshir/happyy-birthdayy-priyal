<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift For You</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5e6ea;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #f2d9df;
    padding: 40px 50px;
    border-radius: 25px;
    text-align: center;
    width: 80%;
    max-width: 800px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    transform: translateY(-40px);
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: #4b2c34;
    margin-bottom: 30px;
}

.stickers {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    justify-items: center;
}

.sticker {
    width: 120px;
    height: 120px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.sticker:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="container">
    <h1>GIFT FOR YOU</h1>

    <div class="stickers">
        <img src="sticker1.png" class="sticker" onclick="openGift(1)">
    </div>
</div>

<script>
function openGift(number) {
    window.location.href = "gift" + number + ".html";
}
</script>

</body>
</html>
