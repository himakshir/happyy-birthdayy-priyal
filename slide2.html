<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  background:#d8c9c9;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:Inter,sans-serif;
  color:#4b2c2c;
}

.wrap{
  text-align:center;
  margin-top:120px; /* slightly higher */
}

h1{
  font-family:'Playfair Display',serif;
  font-size:42px; /* slightly smaller */
  font-weight:700;
}

h1 span{
  color:#ff5f8f;
}

.subtitle{
  margin-top:8px;
  font-size:14px;
  opacity:.8;
}

.card{
  margin-top:40px;
  background:#e7d6d6;
  padding:40px;
  border-radius:30px;
  width:520px;
  box-shadow:0 25px 40px rgba(0,0,0,0.15);
}

button{
  margin-top:30px;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#f7a8bb,#ff5f8f);
  color:white;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>It's your <span>special day</span></h1>
  <div class="subtitle">And I made something for you</div>

  <div class="card">
    <button onclick="next()">Next</button>
  </div>
</div>

<script>
function next(){
  location.href="slide3.html";
}
</script>

</body>
</html>
