<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Slide 2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#ffe7ee;
  --bg2:#ffd6e2;
  --pink:#ff5f8f;
  --soft:#ffd0dc;
  --text:#7a3b4a;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
}

.wrap{
  width:100%;
  max-width:420px;
  text-align:center;
  padding:20px;
}

.title{
  font-family:'Playfair Display',serif;
  font-size:32px;
  background:linear-gradient(135deg,#ff9fba,#ff5f8f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.controls{
  margin-top:40px;
}

button{
  border:none;
  border-radius:999px;
  padding:12px 30px;
  font-weight:700;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,#ff9fba,#ff5f8f);
  box-shadow:0 12px 22px rgba(255,95,143,.35);
}
</style>
</head>

<body>
<div class="wrap">
  <div class="title">It's your special day, yayyy!!!</div>

  <div class="controls">
    <button onclick="next()">Next</button>
  </div>
</div>

<script>
function next(){
  location.href="slide3.html";
}
</script>

</body>
</html>
