<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happiest 16th Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#ffe6ef;
    --bg2:#ffd6e6;
    --pink:#ff5f8f;
    --text:#3a0f22;
  }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(255,95,143,.18), transparent 60%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    font-family:Inter, system-ui, sans-serif;
    color:var(--text);
    overflow:hidden;
  }

  .wrap{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-size:38px;
    margin-bottom:10px;
    background:linear-gradient(135deg,#ff7aa5,#ff3f7f);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: pop 1.2s ease both;
  }

  .img-box{
    margin-top:20px;
    animation: float 3s ease-in-out infinite;
  }

  .img-box img{
    width:220px;
    max-width:80vw;
    border-radius:20px;
    box-shadow:0 18px 30px rgba(255,95,143,.35);
  }

  .next-btn{
    margin-top:28px;
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#ff7aa5,#ff3f7f);
    color:white;
    box-shadow:0 12px 24px rgba(255,95,143,.4);
  }

  /* Animations */
  @keyframes pop{
    0%{transform:scale(.8); opacity:0}
    100%{transform:scale(1); opacity:1}
  }

  @keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
  }

  /* Balloons */
  .balloons span{
    position:absolute;
    bottom:-120px;
    width:60px;
    height:80px;
    background: radial-gradient(circle at 30% 30%, #fff, #ff7aa5);
    border-radius:50% 50% 45% 45%;
    animation: rise 10s linear infinite;
    opacity:.85;
  }

  .balloons span:nth-child(2){ left:20%; animation-duration:12s; background:radial-gradient(circle at 30% 30%, #fff, #ff9fc2);}
  .balloons span:nth-child(3){ left:40%; animation-duration:9s; background:radial-gradient(circle at 30% 30%, #fff, #ffc2d6);}
  .balloons span:nth-child(4){ left:60%; animation-duration:11s; background:radial-gradient(circle at 30% 30%, #fff, #ff7aa5);}
  .balloons span:nth-child(5){ left:80%; animation-duration:13s; background:radial-gradient(circle at 30% 30%, #fff, #ff9fc2);}

  @keyframes rise{
    from{ transform:translateY(0); }
    to{ transform:translateY(-120vh); }
  }
</style>
</head>
<body>

<div class="balloons">
  <span style="left:10%"></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="wrap">
  <h1>Happiest 16th Birthday Girllll <33</h1>

  <div class="img-box">
    <!-- Upload your PNG in repo root and name it birthday.png -->
    <img src="birthday.png" alt="Birthday image">
  </div>

  <button class="next-btn" onclick="location.href='final.html'">
    Continue 💖
  </button>
</div>

</body>
</html>
