<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5e6ea;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #f2d9df;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

h1 {
    color: #4b2c34;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 100px;
    height: 100px;
    background: white;
    font-size: 40px;
    font-weight: bold;
    border-radius: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

#status {
    margin-top: 20px;
    font-weight: bold;
}

button {
    margin-top: 15px;
    padding: 8px 20px;
    border: none;
    border-radius: 20px;
    background: #e78fa7;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
    <h1>Tic Tac Toe</h1>
    <div class="board" id="board"></div>
    <div id="status">Your turn</div>
    <button onclick="resetGame()">Restart</button>
</div>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let cells = [];
let gameActive = true;

function createBoard() {
    board.innerHTML = "";
    cells = [];

    for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.addEventListener("click", handleClick);
        board.appendChild(cell);
        cells.push(cell);
    }
}

function handleClick(e) {
    const cell = e.target;

    if (cell.textContent !== "" || !gameActive) return;

    cell.textContent = "X";

    if (checkWinner("X")) {
        statusText.textContent = "You win!";
        gameActive = false;

        setTimeout(() => {
            window.location.href = "slide3.html";
        }, 1500);

        return;
    }

    if (isDraw()) {
        statusText.textContent = "Draw!";
        gameActive = false;
        return;
    }

    computerMove();
}

function computerMove() {
    let emptyCells = cells.filter(cell => cell.textContent === "");

    if (emptyCells.length === 0) return;

    let move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    move.textContent = "O";

    if (checkWinner("O")) {
        statusText.textContent = "Computer wins!";
        gameActive = false;
    }
}

function checkWinner(player) {
    const patterns = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    return patterns.some(pattern =>
        pattern.every(index =>
            cells[index].textContent === player
        )
    );
}

function isDraw() {
    return cells.every(cell => cell.textContent !== "");
}

function resetGame() {
    gameActive = true;
    statusText.textContent = "Your turn";
    createBoard();
}

createBoard();
</script>

</body>
</html>
