<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#ffe7ee;
    --bg2:#ffd6e2;
    --panel:#ffffff;
    --pink:#ff5f8f;
    --soft:#ffd0dc;
    --text:#7a3b4a;
  }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg, var(--bg1), var(--bg2));
    font-family:Inter, system-ui, sans-serif;
    color:var(--text);
  }

  .wrap{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:20px;
  }

  .title{
    font-family:'Playfair Display', serif;
    font-size:30px;
    margin-bottom:6px;
    background:linear-gradient(135deg,#ff9fba,#ff5f8f);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .subtitle{
    font-size:13px;
    margin-bottom:14px;
    opacity:.8;
  }

  .board-wrap{
    position:relative;
    margin:0 auto 16px;
    width:280px;
  }

  .board{
    background:#fff;
    border-radius:20px;
    padding:16px;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
  }

  .cell{
    background:#fff;
    border-radius:14px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(255,95,143,.25);
    border:2px solid var(--soft);
  }

  .x{ color:#ff5f8f; }
  .o{ color:#ff9fba; }

  .line{
    position:absolute;
    height:6px;
    background:#ff5f8f;
    border-radius:6px;
    transform-origin:left center;
    display:none;
  }

  .win-text{
    font-weight:700;
    margin:10px 0;
    display:none;
    color:#ff5f8f;
  }

  .controls{
    display:flex;
    gap:12px;
    justify-content:center;
  }

  button{
    border:none;
    border-radius:999px;
    padding:10px 22px;
    font-weight:700;
    cursor:pointer;
    color:#fff;
    background:linear-gradient(135deg,#ff9fba,#ff5f8f);
    box-shadow:0 12px 22px rgba(255,95,143,.35);
  }

  button[disabled]{
    opacity:.5;
    box-shadow:none;
    cursor:not-allowed;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="title">Tic Tac Toe</div>
  <div class="subtitle">Win to unlock the surprise 💖</div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="line" id="winLine"></div>
  </div>

  <div class="win-text" id="winText">You won! 🎉</div>

  <div class="controls">
    <button id="restart">Restart</button>
    <button id="nextBtn" disabled>Next</button>
  </div>
</div>

<script>
  const board = document.getElementById("board");
  const winLine = document.getElementById("winLine");
  const winText = document.getElementById("winText");
  const nextBtn = document.getElementById("nextBtn");
  const restartBtn = document.getElementById("restart");

  let cells = Array(9).fill("");
  let gameOver = false;
  let isPlayerTurn = true;

  const wins = [
    [0,1,2, 0, 40, 0],
    [3,4,5, 0, 120, 0],
    [6,7,8, 0, 200, 0],
    [0,3,6, -40, 120, 90],
    [1,4,7, 40, 120, 90],
    [2,5,8, 120, 120, 90],
    [0,4,8, -10, 20, 45],
    [2,4,6, -10, 220, -45]
  ];

  function createBoard(){
    board.innerHTML = "";
    cells = Array(9).fill("");
    gameOver = false;
    isPlayerTurn = true;
    winLine.style.display = "none";
    winText.style.display = "none";
    nextBtn.disabled = true;

    for(let i=0;i<9;i++){
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.onclick = () => playerMove(i, cell);
      board.appendChild(cell);
    }
  }

  function playerMove(i, cell){
    if(!isPlayerTurn || cells[i] || gameOver) return;

    isPlayerTurn = false;
    cells[i] = "X";
    cell.textContent = "X";
    cell.classList.add("x");

    if(checkWin("X")) return;

    setTimeout(computerMove, 450);
  }

  function computerMove(){
    if(gameOver) return;

    const empty = cells.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    if(empty.length === 0) return;

    // Computer intentionally plays random (easy to beat)
    const move = empty[Math.floor(Math.random()*empty.length)];
    cells[move] = "O";
    board.children[move].textContent = "O";
    board.children[move].classList.add("o");

    isPlayerTurn = true;
  }

  function checkWin(player){
    for(const [a,b,c, x, y, r] of wins){
      if(cells[a]===player && cells[b]===player && cells[c]===player){
        gameOver = true;
        drawLine(x, y, r);
        winText.style.display = "block";
        nextBtn.disabled = false;
        return true;
      }
    }
    return false;
  }

  function drawLine(x, y, r){
    winLine.style.display = "block";
    winLine.style.width = "260px";
    winLine.style.left = x + "px";
    winLine.style.top = y + "px";
    winLine.style.transform = `rotate(${r}deg)`;
  }

  restartBtn.onclick = createBoard;
  nextBtn.onclick = () => location.href = "slide2.html";

  createBoard();
</script>

</body>
</html>
