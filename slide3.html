<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  background:#d8c9c9;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:Inter,sans-serif;
  color:#4b2c2c;
}

.wrap{
  text-align:center;
  margin-top:120px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:38px;
}

.card{
  margin-top:40px;
  background:#e7d6d6;
  padding:40px;
  border-radius:30px;
  width:520px;
  box-shadow:0 25px 40px rgba(0,0,0,0.15);
}

.buttons{
  margin-top:20px;
  display:flex;
  gap:20px;
  justify-content:center;
}

button{
  padding:10px 24px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#f7a8bb,#ff5f8f);
  color:white;
  font-weight:600;
  cursor:pointer;
}

#response{
  margin-top:25px;
  font-weight:600;
  font-size:18px;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Do you wanna see what I made?</h1>

  <div class="card">
    <div class="buttons">
      <button onclick="yes()">Yes</button>
      <button onclick="no()">No</button>
    </div>

    <div id="response"></div>
  </div>
</div>

<script>
function yes(){
  location.href="slide4.html";
}

function no(){
  document.getElementById("response").innerHTML = 
  "How dare you!!!<br><br><button onclick='reset()'>Go Back</button>";
}

function reset(){
  document.getElementById("response").innerHTML="";
}
</script>

</body>
</html>
