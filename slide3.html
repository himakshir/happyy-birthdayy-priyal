<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:linear-gradient(135deg,#ffe7ee,#ffd6e2);
  font-family:Inter,sans-serif;
  text-align:center;
}

.container{
  margin-top:120px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:30px;
  color:#ff5f8f;
}

.buttons{
  margin-top:40px;
  display:flex;
  gap:20px;
  justify-content:center;
}

button{
  padding:10px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff9fba,#ff5f8f);
  color:white;
  font-weight:600;
  cursor:pointer;
}

#response{
  margin-top:30px;
  font-weight:600;
  color:#7a3b4a;
}
</style>
</head>

<body>

<div class="container">
  <h1>Do you wanna see what I made??</h1>

  <div class="buttons">
    <button onclick="yes()">Yes</button>
    <button onclick="no()">No</button>
  </div>

  <div id="response"></div>
</div>

<script>
function yes(){
  window.location.href="slide4.html";
}

function no(){
  document.getElementById("response").innerHTML =
    "How dare you!!! <br><br><button onclick='goBack()'>Go Back</button>";
}

function goBack(){
  document.getElementById("response").innerHTML="";
}
</script>

</body>
</html>
