<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Slide 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#ffe7ee;
  --bg2:#ffd6e2;
  --pink:#ff5f8f;
  --text:#7a3b4a;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
}

.wrap{
  width:100%;
  max-width:420px;
  text-align:center;
  padding:20px;
}

.title{
  font-family:'Playfair Display',serif;
  font-size:28px;
  background:linear-gradient(135deg,#ff9fba,#ff5f8f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.controls{
  margin-top:40px;
  display:flex;
  gap:15px;
  justify-content:center;
}

button{
  border:none;
  border-radius:999px;
  padding:10px 25px;
  font-weight:700;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,#ff9fba,#ff5f8f);
  box-shadow:0 12px 22px rgba(255,95,143,.35);
}

#response{
  margin-top:30px;
  font-weight:600;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="title">Do you wanna see what I made??</div>

  <div class="controls">
    <button onclick="yes()">Yes</button>
    <button onclick="no()">No</button>
  </div>

  <div id="response"></div>
</div>

<script>
function yes(){
  location.href="slide4.html";
}

function no(){
  document.getElementById("response").innerHTML =
    "How dare you!!! <br><br><button onclick='reset()'>Go Back</button>";
}

function reset(){
  document.getElementById("response").innerHTML="";
}
</script>

</body>
</html>
